<!DOCTYPE html>
<html class="light" lang="ko">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <style>
        body {
            background-color: #FDFCF0; /* Brand Ivory Background */
            color: #1b1b1b;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-error-container": "#93000a",
                        "on-secondary": "#ffffff",
                        "on-surface": "#1b1b1b",
                        "surface-variant": "#e2e2e2",
                        "error": "#ba1a1a",
                        "surface-container": "#eeeeee",
                        "on-primary-fixed-variant": "#234f3b",
                        "tertiary-fixed": "#e5e3d4",
                        "secondary-container": "#e4e3d7",
                        "secondary": "#5e5f56",
                        "on-tertiary-fixed-variant": "#47473c",
                        "secondary-fixed": "#e4e3d7",
                        "on-primary-container": "#6f9c84",
                        "tertiary": "#16170e",
                        "outline": "#717973",
                        "on-tertiary": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "outline-variant": "#c1c8c2",
                        "inverse-on-surface": "#f1f1f1",
                        "inverse-primary": "#a2d1b7",
                        "background": "#f9f9f9",
                        "on-tertiary-fixed": "#1c1c13",
                        "primary-container": "#013220",
                        "surface": "#f9f9f9",
                        "on-surface-variant": "#414943",
                        "primary-fixed-dim": "#a2d1b7",
                        "tertiary-container": "#2b2b21",
                        "secondary-fixed-dim": "#c7c7bc",
                        "on-secondary-fixed": "#1b1c15",
                        "on-primary": "#ffffff",
                        "tertiary-fixed-dim": "#c9c7b9",
                        "surface-container-low": "#f3f3f3",
                        "surface-container-high": "#e8e8e8",
                        "on-secondary-container": "#64655c",
                        "surface-bright": "#f9f9f9",
                        "surface-dim": "#dadada",
                        "on-background": "#1b1b1b",
                        "surface-tint": "#3b6751",
                        "on-primary-fixed": "#002113",
                        "primary-fixed": "#bdedd2",
                        "inverse-surface": "#303030",
                        "on-secondary-fixed-variant": "#46473f",
                        "surface-container-highest": "#e2e2e2",
                        "on-error": "#ffffff",
                        "error-container": "#ffdad6",
                        "primary": "#001b0f",
                        "on-tertiary-container": "#939285"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "container-max": "1200px",
                        "unit": "8px",
                        "margin-mobile": "20px",
                        "margin-desktop": "64px",
                        "gutter": "24px"
                    },
                    "fontFamily": {
                        "headline-lg": ["Manrope"],
                        "disclaimer": ["Manrope"],
                        "headline-lg-mobile": ["Manrope"],
                        "headline-md": ["Manrope"],
                        "body-md": ["Manrope"],
                        "display": ["Manrope"],
                        "label-md": ["Manrope"],
                        "body-lg": ["Manrope"]
                    },
                    "fontSize": {
                        "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "disclaimer": ["12px", {"lineHeight": "16px", "letterSpacing": "0.01em", "fontWeight": "400"}],
                        "headline-lg-mobile": ["28px", {"lineHeight": "36px", "fontWeight": "600"}],
                        "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "display": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}]
                    }
                },
            },
        }
    </script>
</head>
<body class="bg-[#FDFCF0] min-h-screen flex flex-col font-body-md text-on-surface">
<main class="flex-grow flex items-center justify-center py-16 px-margin-mobile">
<div class="max-w-container-max w-full text-center">
    <h1 class="font-display text-display text-primary max-w-3xl mx-auto leading-tight mb-2">삶은 짧고 세상은 넓다.<br/>최대한 많은 곳을 경험하라.</h1>
    <p class="font-disclaimer text-disclaimer text-on-surface-variant text-center mb-12 italic">-사이먼 레이븐</p>
    
    <div class="bg-[#FDFCF0] p-12 rounded-xl border border-secondary-container max-w-5xl mx-auto">
        <div class="grid grid-cols-1 gap-6 mb-10 md:grid-cols-4">
            
            <div class="text-left">
                <label class="font-label-md text-label-md text-on-surface-variant block mb-2 px-1">Theme</label>
                <div class="relative group">
                    <select id="category" class="w-full appearance-none bg-transparent border-b border-secondary-container py-3 px-1 font-body-md focus:outline-none focus:border-primary-container transition-colors cursor-pointer">
                        <option value="" disabled selected>Select Theme</option>
                        <option value="쇼핑">쇼핑</option>
                        <option value="관광">관광</option>
                        <option value="미식">미식</option>
                    </select>
                    <span class="material-symbols-outlined absolute right-2 top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant">expand_more</span>
                </div>
            </div>
            
            <div class="text-left">
                <label class="font-label-md text-label-md text-on-surface-variant block mb-2 px-1">Companion</label>
                <div class="relative group">
                    <select id="companion_type" class="w-full appearance-none bg-transparent border-b border-secondary-container py-3 px-1 font-body-md focus:outline-none focus:border-primary-container transition-colors cursor-pointer">
                        <option value="" disabled selected>With whom?</option>
                        <option value="혼자 떠나는 여행">혼자 떠나는 여행</option>
                        <option value="친구와 떠나는 여행">친구와 떠나는 여행</option>
                        <option value="연인과 떠나는 여행">연인과 떠나는 여행</option>
                        <option value="부모님과 떠나는 여행">부모님과 떠나는 여행</option>
                    </select>
                    <span class="material-symbols-outlined absolute right-2 top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant">expand_more</span>
                </div>
            </div>

            <div class="text-left">
                <label class="font-label-md text-label-md text-on-surface-variant block mb-2 px-1">Age</label>
                <div class="relative group">
                    <select id="age" class="w-full appearance-none bg-transparent border-b border-secondary-container py-3 px-1 font-body-md focus:outline-none focus:border-primary-container transition-colors cursor-pointer">
                        <option value="" disabled selected>나이</option>
                        <option value="15">10대</option>
                        <option value="25">20대</option>
                        <option value="35">30대</option>
                        <option value="45">40대</option>
                        <option value="55">50대</option>
                    </select>
                    <span class="material-symbols-outlined absolute right-2 top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant">expand_more</span>
                </div>
            </div>
            
            <div class="text-left">
                <label class="font-label-md text-label-md text-on-surface-variant block mb-2 px-1">Max places per day</label>
                <div class="relative group">
                    <select id="n_places" class="w-full appearance-none bg-transparent border-b border-secondary-container py-3 px-1 font-body-md focus:outline-none focus:border-primary-container transition-colors cursor-pointer">
                        <option value="" disabled selected>Daily Pace</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                    </select>
                    <span class="material-symbols-outlined absolute right-2 top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant">expand_more</span>
                </div>
            </div>
        </div>
        
        <div class="flex justify-center">
            <button id="submitBtn" class="bg-primary-container text-on-primary font-label-md text-label-md px-12 py-5 rounded-DEFAULT tracking-widest hover:opacity-95 transition-all flex items-center gap-3 active:scale-95">
                DISCOVER YOUR JOURNEY
                <span class="material-symbols-outlined text-body-md">arrow_forward</span>
            </button>
        </div>
    </div>
</div>
</main>

<footer class="bg-surface border-t border-secondary-container">
    <div class="flex flex-col items-center justify-center w-full py-12 px-margin-mobile gap-6 max-w-container-max mx-auto">
        <div class="font-display text-headline-md text-primary tracking-tight">KMU AIM</div>
        <p class="font-disclaimer text-disclaimer text-center opacity-60 max-w-lg">
            AI가 생성한 콘텐츠는 실제 사실과 다를 수 있습니다. 한 번 더 확인해 주세요. © 2026 AIM_pytorch. All rights reserved.
        </p>
    </div>
</footer>
<script src="login.js"></script>
</body>
</html>
